<!DOCTYPE html>
<html>
<head>
    <title>BuildMitra CORS Test</title>
    <style>
        body { font-family: Arial; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        button { background: #667eea; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #5a67d8; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 5px; overflow-x: auto; }
        .success { color: green; }
        .error { color: red; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏗 BuildMitra Floorplan API Test</h1>
        <p>Testing CORS connection to backend</p>
        <button onclick="testAPI()">🚀 Test API Connection</button>
        <div id="result"></div>
    </div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="status info">⏳ Connecting to API...</div>';
            
            try {
                const response = await fetch('http://localhost:5000/api/floorplan/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        plotWidth: 30,
                        plotDepth: 40,
                        bedrooms: 3,
                        vaastu: true
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = `
                        <div class="status success" style="background:#d4edda;color:#155724;">
                            ✅ SUCCESS! CORS is working!
                        </div>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.innerHTML = `<div class="status error">❌ Error: ${response.status}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="status error">❌ Error: ${error.message}<br><br>Make sure server is running with CORS enabled</div>`;
            }
        }
    </script>
</body>
</html>
