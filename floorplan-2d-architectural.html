<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildMitra - 2D Architectural Floorplan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #2c3e50;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #ecf0f1;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px 30px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 0;
        }

        .sidebar {
            background: #34495e;
            padding: 20px;
            color: white;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
            color: #ecf0f1;
        }

        .control-group input, .control-group select {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            background: #2c3e50;
            color: white;
            border: 1px solid #466085;
        }

        .control-group input:focus, .control-group select:focus {
            outline: none;
            border-color: #3498db;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .server-status {
            background: #2c3e50;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            margin-bottom: 20px;
        }

        .server-status.online {
            background: #27ae60;
            color: white;
        }

        .server-status.offline {
            background: #e74c3c;
            color: white;
        }

        .floorplan-area {
            background: #f5f5f5;
            padding: 20px;
            min-height: 700px;
        }

        .floorplan-canvas {
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            overflow: auto;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: #fafafa;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .room-stats {
            margin-top: 20px;
            background: #2c3e50;
            padding: 15px;
            border-radius: 8px;
        }

        .room-stats h4 {
            margin-bottom: 10px;
            color: #3498db;
        }

        .room-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .room-item {
            padding: 8px;
            background: #34495e;
            border-radius: 5px;
            margin-bottom: 5px;
            font-size: 11px;
            border-left: 3px solid #3498db;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏗 BuildMitra - 2D Architectural Floorplan</h1>
            <p>Professional 2D Layout with Walls, Doors, and Windows</p>
        </div>

        <div class="content">
            <div class="sidebar">
                <div class="server-status" id="serverStatus">
                    🔍 Checking server...
                </div>

                <div class="control-group">
                    <label>📏 Plot Width (ft)</label>
                    <input type="number" id="plotWidth" value="40" step="5">
                </div>

                <div class="control-group">
                    <label>📐 Plot Depth (ft)</label>
                    <input type="number" id="plotDepth" value="50" step="5">
                </div>

                <div class="control-group">
                    <label>🛏 Bedrooms</label>
                    <select id="bedrooms">
                        <option value="1">1 Bedroom</option>
                        <option value="2">2 Bedrooms</option>
                        <option value="3" selected>3 Bedrooms</option>
                        <option value="4">4 Bedrooms</option>
                        <option value="5">5 Bedrooms</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>🧭 Vaastu</label>
                    <select id="vaastu">
                        <option value="true">Enabled</option>
                        <option value="false">Disabled</option>
                    </select>
                </div>

                <button onclick="generateFloorplan()">🏠 Generate 2D Floorplan</button>

                <div class="room-stats" id="roomStats" style="display: none;">
                    <h4>📋 Room Details</h4>
                    <div id="roomList" class="room-list"></div>
                </div>
            </div>

            <div class="floorplan-area">
                <div class="floorplan-canvas">
                    <canvas id="floorplanCanvas" width="900" height="700"></canvas>
                </div>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 10px;">Generating 2D Floorplan...</p>
                </div>
                <div id="status"></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('floorplanCanvas');
        const ctx = canvas.getContext('2d');
        
        // Fixed canvas dimensions
        canvas.width = 900;
        canvas.height = 700;
        
        function drawWall(x, y, width, height, isVertical = false) {
            ctx.beginPath();
            if (isVertical) {
                ctx.fillStyle = '#8B7355';
                ctx.fillRect(x - 4, y, 8, height);
                ctx.fillStyle = '#A0522D';
                ctx.fillRect(x - 2, y, 4, height);
            } else {
                ctx.fillStyle = '#8B7355';
                ctx.fillRect(x, y - 4, width, 8);
                ctx.fillStyle = '#A0522D';
                ctx.fillRect(x, y - 2, width, 4);
            }
        }
        
        function drawDoor(x, y, width, height, direction) {
            ctx.beginPath();
            ctx.fillStyle = '#DEB887';
            ctx.fillRect(x, y, width, height);
            ctx.strokeStyle = '#8B7355';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, width, height);
            
            // Draw door swing arc
            ctx.beginPath();
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 1;
            if (direction === 'right') {
                ctx.arc(x, y + height, height, -Math.PI/2, 0);
            } else if (direction === 'left') {
                ctx.arc(x + width, y + height, height, Math.PI, Math.PI/2);
            } else if (direction === 'up') {
                ctx.arc(x + width, y, width, 0, Math.PI/2);
            } else {
                ctx.arc(x, y, width, Math.PI/2, Math.PI);
            }
            ctx.stroke();
        }
        
        function drawWindow(x, y, width, height) {
            ctx.fillStyle = '#ADD8E6';
            ctx.fillRect(x, y, width, height);
            ctx.strokeStyle = '#4682B4';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, width, height);
            // Draw window panes
            ctx.beginPath();
            ctx.moveTo(x + width/2, y);
            ctx.lineTo(x + width/2, y + height);
            ctx.moveTo(x, y + height/2);
            ctx.lineTo(x + width, y + height/2);
            ctx.stroke();
        }
        
        function drawRoom(x, y, width, height, name, color) {
            // Draw room background
            ctx.fillStyle = color;
            ctx.fillRect(x, y, width, height);
            
            // Draw walls (thick borders)
            ctx.strokeStyle = '#654321';
            ctx.lineWidth = 4;
            ctx.strokeRect(x, y, width, height);
            
            // Draw room name
            ctx.fillStyle = '#2c3e50';
            ctx.font = 'bold 14px "Segoe UI"';
            ctx.textAlign = 'center';
            ctx.fillText(name, x + width/2, y + height/2 - 10);
            
            // Draw room dimensions
            ctx.font = '10px "Segoe UI"';
            ctx.fillStyle = '#666';
            ctx.fillText(`${width}' x ${height}'`, x + width/2, y + height/2 + 15);
            
            // Draw area
            let area = (width * height).toFixed(0);
            ctx.font = '9px "Segoe UI"';
            ctx.fillStyle = '#888';
            ctx.fillText(`${area} sq ft`, x + width/2, y + height/2 + 30);
        }
        
        function drawFloorplan(rooms, plotWidth, plotDepth) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background grid
            ctx.fillStyle = '#fafafa';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }
            
            // Calculate scale to fit all rooms
            let maxX = 0, maxY = 0;
            rooms.forEach(room => {
                maxX = Math.max(maxX, room.x + (room.width || 120));
                maxY = Math.max(maxY, room.y + (room.height || 100));
            });
            
            const scaleX = (canvas.width - 100) / maxX;
            const scaleY = (canvas.height - 100) / maxY;
            const scale = Math.min(scaleX, scaleY, 1.2);
            const offsetX = 50;
            const offsetY = 50;
            
            // Color mapping
            const roomColors = {
                'Hall': '#FFF8DC',
                'Kitchen': '#FFF0E0',
                'Bedroom': '#E8F4FD',
                'Bathroom': '#E0F0F0',
                'Living': '#F0E6D2',
                'Dining': '#F5E6D3'
            };
            
            // Draw rooms
            rooms.forEach(room => {
                let color = roomColors[room.name] || '#F5F5DC';
                if (room.name.includes('Bedroom')) color = roomColors['Bedroom'];
                
                const x = offsetX + (room.x * scale);
                const y = offsetY + (room.y * scale);
                const width = (room.width || 120) * scale;
                const height = (room.height || 100) * scale;
                
                drawRoom(x, y, width, height, room.name, color);
                
                // Add doors to bedrooms
                if (room.name.includes('Bedroom')) {
                    const doorX = x + width - 20;
                    const doorY = y + height - 15;
                    drawDoor(doorX, doorY, 20, 15, 'right');
                }
                
                // Add windows to exterior rooms
                if (room.name === 'Hall' || room.name === 'Kitchen') {
                    drawWindow(x + 20, y - 8, 40, 8);
                    drawWindow(x + width - 60, y + height, 40, 8);
                }
            });
            
            // Draw corridor/connection lines
            ctx.beginPath();
            ctx.strokeStyle = '#999';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            
            const hallRoom = rooms.find(r => r.name === 'Hall');
            if (hallRoom) {
                const hallX = offsetX + (hallRoom.x * scale);
                const hallY = offsetY + (hallRoom.y * scale);
                
                rooms.forEach(room => {
                    if (room.name.includes('Bedroom')) {
                        const roomX = offsetX + (room.x * scale);
                        const roomY = offsetY + (room.y * scale);
                        ctx.beginPath();
                        ctx.moveTo(hallX + 60, hallY + 50);
                        ctx.lineTo(roomX + 50, roomY + 45);
                        ctx.stroke();
                    }
                });
            }
            
            ctx.setLineDash([]);
            
            // Draw title and scale
            ctx.fillStyle = '#2c3e50';
            ctx.font = 'bold 16px "Segoe UI"';
            ctx.textAlign = 'left';
            ctx.fillText(`2D Floorplan - ${plotWidth}' x ${plotDepth}' Plot`, 20, 30);
            ctx.font = '12px "Segoe UI"';
            ctx.fillStyle = '#666';
            ctx.fillText(`Scale: 1:${Math.round(1/scale)} | Total Area: ${plotWidth * plotDepth} sq ft`, 20, 55);
        }
        
        async function checkServerStatus() {
            const statusDiv = document.getElementById('serverStatus');
            try {
                const response = await fetch('http://localhost:5000/api/floorplan/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ plotWidth: 30, plotDepth: 40, bedrooms: 3, vaastu: true })
                });
                
                if (response.ok) {
                    statusDiv.innerHTML = '✅ Server Online | CORS Enabled';
                    statusDiv.className = 'server-status online';
                    return true;
                }
            } catch (error) {
                statusDiv.innerHTML = '❌ Server Offline - Start with: npm start';
                statusDiv.className = 'server-status offline';
                return false;
            }
        }
        
        async function generateFloorplan() {
            const plotWidth = parseInt(document.getElementById('plotWidth').value);
            const plotDepth = parseInt(document.getElementById('plotDepth').value);
            const bedrooms = parseInt(document.getElementById('bedrooms').value);
            const vaastu = document.getElementById('vaastu').value === 'true';
            
            const loading = document.getElementById('loading');
            const statusDiv = document.getElementById('status');
            const roomStats = document.getElementById('roomStats');
            
            loading.classList.add('active');
            statusDiv.innerHTML = '';
            
            try {
                const response = await fetch('http://localhost:5000/api/floorplan/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ plotWidth, plotDepth, bedrooms, vaastu })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    drawFloorplan(data.data.rooms, plotWidth, plotDepth);
                    statusDiv.innerHTML = '<div class="status success">✅ 2D Floorplan Generated Successfully!</div>';
                    
                    // Display room list
                    const roomListDiv = document.getElementById('roomList');
                    roomListDiv.innerHTML = '';
                    data.data.rooms.forEach(room => {
                        const area = ((room.width || 120) * (room.height || 100)).toFixed(0);
                        roomListDiv.innerHTML += `
                            <div class="room-item">
                                <strong>${room.name}</strong><br>
                                ${room.width || 120}' x ${room.height || 100}' (${area} sq ft)
                            </div>
                        `;
                    });
                    roomStats.style.display = 'block';
                } else {
                    statusDiv.innerHTML = '<div class="status error">❌ Generation Failed</div>';
                }
            } catch (error) {
                statusDiv.innerHTML = '<div class="status error">❌ Error: ' + error.message + '</div>';
            } finally {
                loading.classList.remove('active');
            }
        }
        
        // Initial empty floorplan
        function drawEmptyFloorplan() {
            ctx.fillStyle = '#fafafa';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#999';
            ctx.font = '18px "Segoe UI"';
            ctx.textAlign = 'center';
            ctx.fillText('🏗 Click "Generate 2D Floorplan" to Start', canvas.width/2, canvas.height/2);
            ctx.font = '12px "Segoe UI"';
            ctx.fillStyle = '#666';
            ctx.fillText('Architectural 2D layout with walls, doors, and windows', canvas.width/2, canvas.height/2 + 40);
        }
        
        drawEmptyFloorplan();
        checkServerStatus();
        setInterval(checkServerStatus, 5000);
    </script>
</body>
</html>
