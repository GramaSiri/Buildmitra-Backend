<!DOCTYPE html>
<html>
<head>
    <title>BuildMitra Floorplan Test</title>
    <style>
        body { font-family: Arial; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        button { background: #667eea; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 5px; overflow-x: auto; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏗 BuildMitra Floorplan</h1>
        <p>Plot: 30x40 | Bedrooms: 3 | Vaastu: Enabled</p>
        <button onclick="testAPI()">Generate Floorplan</button>
        <div id="result"></div>
    </div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="status">⏳ Generating floorplan...</div>';
            
            try {
                const response = await fetch('http://localhost:5000/api/floorplan/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    mode: 'cors',  // Explicitly request CORS
                    body: JSON.stringify({
                        plotWidth: 30,
                        plotDepth: 40,
                        bedrooms: 3,
                        vaastu: true
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = '<div class="status success">✅ Success! Check console for data</div><pre>' + JSON.stringify(data, null, 2) + '</pre>';
                    console.log('Floorplan data:', data);
                } else {
                    resultDiv.innerHTML = '<div class="status error">❌ Error: ' + response.status + ' ' + response.statusText + '</div>';
                }
            } catch (error) {
                resultDiv.innerHTML = '<div class="status error">❌ CORS Error: ' + error.message + '<br><br>🔧 Solution: Add CORS to your backend as shown above</div>';
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>
